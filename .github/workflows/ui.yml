name: UI

on:
  push:
    branches: [master]
    paths: ["ui/**", "scripts/export_ui_data.py", ".github/workflows/ui.yml"]
  pull_request:
    paths: ["ui/**", "scripts/export_ui_data.py", ".github/workflows/ui.yml"]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json
      # next@15 + react@19 still triggers a peer-dep conflict with some transitive
      # packages; --legacy-peer-deps mirrors the local install that was verified
      # to produce a working build and test run.
      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - run: npm run test
      # No data export in CI (no exoproximo.db); create minimal stubs so
      # `next build` doesn't fail on missing JSON files.
      - name: Stub data dir
        run: |
          mkdir -p public/data/spectra
          echo "[]" > public/data/neos.json
          echo "[]" > public/data/koi.json
          echo "[]" > public/data/close_approaches.json
          echo '{"git_sha":"ci","last_run_at":null,"elements_age_days":-1,"n_neos":0,"n_koi":0}' > public/data/meta.json
      - name: Build (skip prebuild data export)
        run: npx next build
